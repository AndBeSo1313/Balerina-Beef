<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кухня: Управление и ТТК</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
.no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-black text-neutral-100 min-h-screen flex flex-col pb-20 select-none">

<div id="authScreen" class="fixed inset-0 bg-black z-50 flex flex-col justify-center px-6">
<div class="space-y-6 max-w-sm w-full mx-auto">
<div class="space-y-2 text-center">
<h1 class="text-2xl font-bold tracking-tight">Вход в систему</h1>
<p class="text-sm text-neutral-500">Введите данные вашей учетной записи</p>
</div>
<div class="space-y-4">
<input type="text" id="loginInput" placeholder="Имя Фамилия" class="w-full bg-neutral-900 border border-neutral-800/80 rounded-xl px-4 py-3 text-neutral-200 placeholder-neutral-500 focus:outline-none focus:border-neutral-600 transition">
<input type="password" id="passInput" placeholder="Пароль" class="w-full bg-neutral-900 border border-neutral-800/80 rounded-xl px-4 py-3 text-neutral-200 placeholder-neutral-500 focus:outline-none focus:border-neutral-600 transition">
<button onclick="handleLogin()" class="w-full bg-white text-black font-semibold py-3 rounded-xl hover:bg-neutral-200 active:scale-[0.98] transition">Войти</button>
</div>
<p id="authError" class="text-sm text-red-500 text-center hidden">Неверное имя или пароль</p>
</div>
</div>

<header class="px-4 pt-4 pb-2 border-b border-neutral-900 flex justify-between items-center bg-black/80 backdrop-blur sticky top-0 z-30">
<div class="flex items-center gap-3">
<div>
<h2 id="userNameText" class="font-bold text-neutral-200">Загрузка...</h2>
<p id="userRoleText" class="text-xs text-neutral-500">Повар</p>
</div>
<button onclick="handleLogout()" class="text-[10px] text-neutral-400 uppercase tracking-wider bg-neutral-900 border border-neutral-800/60 px-2.5 py-1 rounded-lg hover:text-red-400 active:scale-95 transition">
Выйти
</button>
</div>
<div class="text-right">
<p id="userRateText" class="text-xs text-neutral-400 font-mono">Ставка: -- ₽</p>
</div>
</header>

<main id="mainContent" class="flex-1 px-4 py-4 space-y-6 overflow-y-auto">

<div id="section-home" class="space-y-6">
<div id="infoBlock" class="hidden bg-neutral-900/50 border border-neutral-800/60 rounded-2xl p-4 space-y-2">
<h3 id="infoTitle" class="font-bold text-sm text-amber-400">🔥 ОБЪЯВЛЕНИЕ</h3>
<p id="infoText" class="text-xs text-neutral-400 leading-relaxed"></p>
</div>

<div class="space-y-3">
<h3 class="text-xs font-bold uppercase tracking-wider text-neutral-500">Мой график смен</h3>
<div id="calendarGrid" class="grid grid-cols-7 gap-2 bg-neutral-900/30 border border-neutral-900 p-3 rounded-2xl overflow-x-auto"></div>
</div>

<div class="space-y-3">
<h3 class="text-xs font-bold uppercase tracking-wider text-neutral-500">Финансовый отчет и Штрафы</h3>
<div id="finesList" class="space-y-2"></div>
</div>
</div>

<div id="section-ttk" class="space-y-4 hidden">
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="categoriesBar"></div>
<input type="text" id="searchTtk" oninput="filterTtk()" placeholder="Поиск блюда или полуфабриката..." class="w-full bg-neutral-900/60 border border-neutral-800/80 rounded-xl px-4 py-2.5 text-sm text-neutral-300 placeholder-neutral-500 focus:outline-none focus:border-neutral-700">
<div id="ttkList" class="grid grid-cols-2 gap-3"></div>
</div>

<div id="section-actions" class="space-y-4 hidden">
<button onclick="openActionModal('inventory')" class="w-full bg-neutral-900 border border-neutral-800/80 rounded-2xl p-4 flex items-center justify-between active:scale-[0.99] transition">
<div class="text-left">
<h4 class="font-semibold text-neutral-200">Инвентаризация</h4>
<p class="text-xs text-neutral-500 mt-0.5">Ввод фактических остатков сырья на станциях</p>
</div>
<span class="text-neutral-600">→</span>
</button>

<button onclick="openActionModal('writeoff')" class="w-full bg-neutral-900 border border-neutral-800/80 rounded-2xl p-4 flex items-center justify-between active:scale-[0.99] transition">
<div class="text-left">
<h4 class="font-semibold text-red-400">Списание: Брак / Порча</h4>
<p class="text-xs text-neutral-500 mt-0.5">Фиксация испорченного или сгоревшего сырья</p>
</div>
<span class="text-neutral-600">→</span>
</button>

<button onclick="openActionModal('dinner')" class="w-full bg-neutral-900 border border-neutral-800/80 rounded-2xl p-4 flex items-center justify-between active:scale-[0.99] transition">
<div class="text-left">
<h4 class="font-semibold text-emerald-400">Питание персонала</h4>
<p class="text-xs text-neutral-500 mt-0.5">Составление акта на коллективный обед/ужин</p>
</div>
<span class="text-neutral-600">→</span>
</button>
</div>
</main>

<nav class="fixed bottom-0 left-0 right-0 h-16 bg-neutral-950/90 backdrop-blur border-t border-neutral-900 flex justify-around items-center z-40 px-2">
<button onclick="switchTab('home')" id="btn-home" class="flex flex-col items-center space-y-1 text-white">
<span class="text-xl">🏠</span><span class="text-[10px] font-medium">Главная</span>
</button>
<button onclick="switchTab('ttk')" id="btn-ttk" class="flex flex-col items-center space-y-1 text-neutral-500">
<span class="text-xl">📖</span><span class="text-[10px] font-medium">База ТТК</span>
</button>
<button onclick="switchTab('actions')" id="btn-actions" class="flex flex-col items-center space-y-1 text-neutral-500">
<span class="text-xl">⚡</span><span class="text-[10px] font-medium">Учет</span>
</button>
</nav>

<div id="ttkModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end justify-center hidden" onclick="closeTtkModal()">
<div class="bg-neutral-950 border-t border-neutral-800 rounded-t-3xl w-full max-w-md p-6 space-y-4 max-h-[85vh] overflow-y-auto" onclick="event.stopPropagation()">
<div class="flex justify-between items-start">
<div>
<span id="modalRecipeCategory" class="text-[10px] font-bold uppercase tracking-wider text-amber-500 bg-amber-500/10 px-2 py-0.5 rounded">Кухня</span>
<h3 id="modalRecipeName" class="text-xl font-bold text-neutral-100 mt-1.5">Название ТТК</h3>
<p id="modalRecipeOutput" class="text-xs text-neutral-500 mt-0.5">Выход: —</p>
</div>
<button onclick="closeTtkModal()" class="text-neutral-500 hover:text-white text-xl p-1">✕</button>
</div>
<div class="space-y-2">
<label class="text-xs text-neutral-400">Количество порций:</label>
<input type="number" id="ttkMultiplier" value="1" min="0" step="0.5" oninput="recalcTtk(this.value)" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-neutral-200 font-bold focus:outline-none">
</div>
<table class="w-full text-left text-sm mt-2">
<thead>
<tr class="text-[10px] uppercase text-neutral-500 border-b border-neutral-800">
<th class="pb-2">Ингредиент</th>
<th class="pb-2 text-center">Ед</th>
<th class="pb-2 text-right">Вес</th>
</tr>
</thead>
<tbody id="modalTtkBody" class="divide-y divide-neutral-900/60"></tbody>
</table>
</div>
</div>

<div id="actionModal" class="fixed inset-0 bg-black z-50 flex flex-col hidden">
<header class="px-4 py-4 border-b border-neutral-900 flex justify-between items-center bg-neutral-950">
<h3 id="actionModalTitle" class="font-bold text-neutral-200">Инвентаризация</h3>
<button onclick="closeActionModal()" class="text-neutral-400 p-1 text-sm">Отмена</button>
</header>
<div class="p-4 bg-neutral-950/40 border-b border-neutral-900 hidden" id="actionMetaRow">
<select id="actionReasonSelect" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-neutral-200 focus:outline-none">
<option value="Порча / Брак">❌ Порча / Брак на смене</option>
<option value="Проработка блюда">🍳 Проработка нового меню</option>
<option value="Усушка / Пересорт">⚖️ Усушка / Пересорт сырья</option>
</select>
</div>
<div class="p-4 bg-neutral-950 sticky top-0 z-10"><input type="text" id="actionSearch" oninput="filterActionItems()" placeholder="Поиск продукта..." class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-2.5 text-sm text-neutral-300 focus:outline-none"></div>
<div class="flex-1 overflow-y-auto px-4 pb-24" id="actionItemsList"></div>
<div class="fixed bottom-0 left-0 right-0 p-4 bg-neutral-950/90 backdrop-blur border-t border-neutral-900 flex gap-3"><button onclick="submitActionData()" class="flex-1 bg-white text-black font-bold py-3.5 rounded-xl active:scale-[0.98] transition">Отправить данные на бэкенд</button></div>
</div>

<script>
// ВСТАВЬТЕ СЮДА ВАШ URL РАЗВЕРТЫВАНИЯ ИЗ GOOGLE ТАБЛИЦ
const WEB_APP_URL = "https://script.google.com/macros/s/XXXXX/exec";

let appData = { schedule: [], position: "Повар", rate: 0, recipes: [], items1c: [], info: [], fines: [] };
let currentUser = null; let currentTab = 'home'; let selectedCategory = 'Все'; let activeModalRecipe = null; let activeActionType = 'inventory';

window.onload = () => {
const savedUser = localStorage.getItem('kitchen_user');
if (savedUser) { currentUser = JSON.parse(savedUser); showApp(); }
};

function handleLogin() {
let log = document.getElementById('loginInput').value.trim();
let pas = document.getElementById('passInput').value.trim();
if(!log || !pas) return;
fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "login", login: log, password: pas }) });
currentUser = { name: log, role: "Повар" };
localStorage.setItem('kitchen_user', JSON.stringify(currentUser));
showApp();
}

function handleLogout() {
localStorage.removeItem('kitchen_user');
location.reload();
}

function showApp() {
document.getElementById('authScreen').classList.add('hidden');
loadAppData();
}

function loadAppData() {
if(!currentUser) return;
document.getElementById('userNameText').innerText = currentUser.name;
fetch(`${WEB_APP_URL}?action=getAppData&userName=${encodeURIComponent(currentUser.name)}`)
.then(res => res.json()).then(data => {
if(data.status === "success") { appData = data; renderHome(); renderTtkCategories(); renderTtkList(); }
});
}

function switchTab(tab) {
currentTab = tab;
['home', 'ttk', 'actions'].forEach(t => {
document.getElementById(`section-${t}`).classList.add('hidden');
document.getElementById(`btn-${t}`).className = "flex flex-col items-center space-y-1 text-neutral-500";
});
document.getElementById(`section-${tab}`).classList.remove('hidden');
document.getElementById(`btn-${tab}`).className = "flex flex-col items-center space-y-1 text-white";
}

function renderHome() {
document.getElementById('userRoleText').innerText = appData.position;
document.getElementById('userRateText').innerText = `Ставка: ${appData.rate} ₽`;
if(appData.info && appData.info.length > 0) {
document.getElementById('infoBlock').classList.remove('hidden');
document.getElementById('infoTitle').innerText = `🔥 ${appData.info[0].title}`;
document.getElementById('infoText').innerText = appData.info[0].text;
}
let grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
for(let d = 1; d <= 31; d++) {
let shift = appData.schedule.find(s => s.day === d);
let isWork = shift && shift.shift !== "" && shift.shift.toLowerCase() !== "о";
grid.innerHTML += `<div class="aspect-square flex flex-col items-center justify-center rounded-xl border ${isWork ? 'bg-white text-black border-white font-bold' : 'bg-neutral-900/40 border-neutral-800/40 text-neutral-500'} p-1 min-w-[40px]"><span class="text-[10px] opacity-60">${d}</span><span class="text-xs font-black mt-0.5">${shift ? shift.shift : '-'}</span></div>`;
}
let fList = document.getElementById('finesList'); fList.innerHTML = '';
if(appData.fines.length === 0) { fList.innerHTML = `<p class="text-xs text-neutral-500 py-2">Нарушений и бонусов не обнаружено.</p>`; }
else {
appData.fines.forEach(f => {
let isBonus = f.type.toLowerCase() === 'бонус';
fList.innerHTML += `<div class="bg-neutral-900/40 border border-neutral-900/60 p-3 rounded-xl flex justify-between items-center"><div><p class="text-xs font-medium text-neutral-200">${f.reason}</p><p class="text-[10px] text-neutral-500 mt-0.5">${f.date}</p></div><span class="text-xs font-mono font-bold ${isBonus ? 'text-emerald-400' : 'text-red-400'}">${isBonus ? '+' : '-'}${f.volume} ₽</span></div>`;
});
}
}

function renderTtkCategories() {
let bar = document.getElementById('categoriesBar');
let cats = ['Все', ...new Set(appData.recipes.map(r => r.category))];
bar.innerHTML = cats.map(c => `<button onclick="selectCategory('${c}')" class="px-4 py-1.5 text-xs rounded-full whitespace-nowrap border ${selectedCategory === c ? 'bg-white text-black border-white font-semibold' : 'bg-neutral-900 border-neutral-800 text-neutral-400'}">${c}</button>`).join('');
}
function selectCategory(cat) { selectedCategory = cat; renderTtkCategories(); filterTtk(); }

function renderTtkList() {
let container = document.getElementById('ttkList');
let filtered = appData.recipes.filter(r => selectedCategory === 'Все' || r.category === selectedCategory);
container.innerHTML = filtered.map(r => `<div onclick="openTtkModal('${r.name}')" class="bg-neutral-900/40 border border-neutral-800/60 p-3.5 rounded-2xl flex flex-col justify-between h-28"><div><span class="text-[9px] font-bold text-neutral-500 uppercase tracking-wider">${r.category}</span><h4 class="font-bold text-sm text-neutral-200 mt-1 line-clamp-2 leading-tight">${r.name}</h4></div><p class="text-[10px] text-neutral-400 font-medium">Выход: ${r.ingredients[0]?.output || '—'}</p></div>`).join('');
}

function filterTtk() {
let query = document.getElementById('searchTtk').value.toLowerCase().trim();
let cards = document.getElementById('ttkList').children;
appData.recipes.filter(r => selectedCategory === 'Все' || r.category === selectedCategory).forEach((r, idx) => {
if(cards[idx]) { cards[idx].style.display = (r.name.toLowerCase().includes(query) || r.ingredients.some(i => i.name.toLowerCase().includes(query))) ? 'flex' : 'none'; }
});
}

function openTtkModal(name) {
let r = appData.recipes.find(rec => rec.name === name); if(!r) return; activeModalRecipe = r;
document.getElementById('modalRecipeCategory').innerText = r.category;
document.getElementById('modalRecipeName').innerText = r.name;
document.getElementById('modalRecipeOutput').innerText = `Выход: ${r.ingredients[0]?.output || '—'}`;
document.getElementById('ttkMultiplier').value = 1; recalcTtk(1);
document.getElementById('ttkModal').classList.remove('hidden');
}

function recalcTtk(mStr) {
if(!activeModalRecipe) return; let m = parseFloat(mStr) || 0; if(m < 0) m = 0;
document.getElementById('modalTtkBody').innerHTML = activeModalRecipe.ingredients.map(i => `
<tr class="border-b border-neutral-800/40">
<td class="py-2.5 font-medium text-neutral-200">${i.name}</td>
<td class="py-2.5 text-center text-neutral-500 uppercase text-[10px]">${i.unit}</td>
<td class="py-2.5 text-right font-mono text-neutral-400 font-bold">${(i.brutto * m).toFixed(3).replace(/\.000$/, '')}</td>
</tr>`).join('');
}
function closeTtkModal() { document.getElementById('ttkModal').classList.add('hidden'); }

function openActionModal(type) {
activeActionType = type; document.getElementById('actionModal').classList.remove('hidden'); document.getElementById('actionSearch').value = '';
let title = "Инвентаризация"; document.getElementById('actionMetaRow').classList.add('hidden');
if(type === 'writeoff') { title = "Списание: Брак / Порча"; document.getElementById('actionMetaRow').classList.remove('hidden'); }
else if(type === 'dinner') { title = "Акт питания персонала"; }
document.getElementById('actionModalTitle').innerText = title; renderActionItems();
}

function renderActionItems() {
document.getElementById('actionItemsList').innerHTML = appData.items1c.map((item, idx) => `
<div class="action-item-row py-3 border-b border-neutral-900 flex justify-between items-center gap-4" data-name="${item.name.toLowerCase()}">
<div class="flex-1"><p class="text-sm font-medium text-neutral-200">${item.name}</p><p class="text-[10px] text-neutral-500 uppercase mt-0.5">${item.unit}</p></div>
<input type="number" step="0.001" placeholder="0.00" class="action-val-input w-24 bg-neutral-900 border border-neutral-800 rounded-lg px-2 py-1.5 text-right text-neutral-100 font-mono text-sm" data-idx="${idx}">
</div>`).join('');
}

function filterActionItems() {
let query = document.getElementById('actionSearch').value.toLowerCase().trim();
Array.from(document.getElementById('actionItemsList').getElementsByClassName('action-item-row')).forEach(row => {
row.style.display = row.getAttribute('data-name').includes(query) ? 'flex' : 'none';
});
}
function closeActionModal() { document.getElementById('actionModal').classList.add('hidden'); }

function submitActionData() {
let payload = {
action: activeActionType === 'inventory' ? 'inventory' : (activeActionType === 'writeoff' ? 'writeOff' : 'staffDinner'),
userName: currentUser.name, items: [], title: activeActionType === 'dinner' ? "Обед стаффа" : "",
reason: activeActionType === 'writeoff' ? document.getElementById('actionReasonSelect').value : ""
};
Array.from(document.getElementById('actionItemsList').getElementsByClassName('action-val-input')).forEach(inp => {
let v = parseFloat(inp.value) || 0;
if(v > 0) { let idx = parseInt(inp.getAttribute('data-idx')); let ori = appData.items1c[idx]; payload.items.push({ name: ori.name, unit: ori.unit, volume: v }); }
});
if(payload.items.length === 0) return;
if(activeActionType === 'writeoff') {
payload.items.forEach(item => { fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "writeOff", userName: currentUser.name, name: item.name, unit: item.unit, volume: item.volume, reason: payload.reason }) }); });
} else {
fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
}
alert("Данные успешно отправлены!"); closeActionModal();
}
</script>
</body>
</html>
