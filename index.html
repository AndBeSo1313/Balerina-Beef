<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кухня: Управление</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased text-gray-900 select-none">

    <div class="max-w-md mx-auto bg-gray-50 min-h-screen shadow-xl relative flex flex-col pb-16">
        
        <div id="screen-auth" class="flex-1 flex flex-col justify-center p-6 bg-slate-900 text-white">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-400 rounded-2xl flex items-center justify-center mx-auto shadow-lg mb-4">
                    <i class="text-slate-950 w-8 h-8 stroke-[2.5]" data-lucide="chef-hat"></i>
                </div>
                <h2 class="text-2xl font-bold">Наша Кухня</h2>
                <p class="text-gray-400 text-xs mt-1">Введите доступы для управления</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-1.5">Логин</label>
                    <input type="text" id="authLogin" placeholder="Ваше имя" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400 text-base placeholder-gray-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-1.5">Пароль</label>
                    <input type="password" id="authPassword" placeholder="••••" inputmode="numeric" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400 text-base text-center font-bold tracking-widest placeholder-gray-500">
                </div>
                <button onclick="handleLogin(event)" class="w-full bg-amber-400 hover:bg-amber-500 text-slate-950 font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition-all text-sm mt-2 flex items-center justify-center gap-2">
                    Войти в систему
                </button>
            </div>
        </div>

        <div id="screen-inventory" class="flex-1 flex flex-col hidden">
            <div class="bg-slate-900 text-white p-4 sticky top-0 z-10 shadow-md">
                <div class="flex justify-between items-center">
                    <h1 class="text-xl font-bold flex items-center gap-2">
                        <i class="text-amber-400 w-5 h-5" data-lucide="package"></i> Инвентарь
                    </h1>
                    <button onclick="handleLogout()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5 text-gray-300">
                        <span class="userBadgeName">Повар</span> <i class="w-3.5 h-3.5 text-red-400" data-lucide="log-out"></i>
                    </button>
                </div>
                <div class="relative mt-3">
                    <i class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" data-lucide="search"></i>
                    <input type="text" id="invSearch" placeholder="Поиск товара..." class="w-full bg-slate-800 text-white pl-10 pr-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 placeholder-gray-500 text-base" oninput="filterInventory()">
                </div>
            </div>
            <div class="flex gap-2 overflow-x-auto p-3 no-scrollbar bg-white border-b border-gray-200" id="invCategories"></div>
            <div class="p-3 space-y-2 flex-1" id="invList"></div>
            <div class="p-4 bg-white border-t border-gray-200 flex items-center justify-between sticky bottom-0 z-10 shadow-md">
                <div>
                    <div class="text-xs text-gray-500 font-medium">Посчитано:</div>
                    <div class="text-base font-bold text-slate-900"><span id="countedFact">0</span> / <span id="totalCount">0</span></div>
                </div>
                <button onclick="sendReport(event)" class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl font-semibold text-sm active:scale-95 transition-all">Отправить</button>
            </div>
        </div>

        <div id="screen-recipes" class="flex-1 flex flex-col hidden">
            <div class="bg-slate-900 text-white p-4 sticky top-0 z-10 shadow-md">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="text-amber-400 w-5 h-5" data-lucide="book-open"></i> Техкарты
                </h1>
                <div class="relative mt-3">
                    <i class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" data-lucide="search"></i>
                    <input type="text" id="recSearch" placeholder="Введи название..." class="w-full bg-slate-800 text-white pl-10 pr-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 placeholder-gray-500 text-base" oninput="filterRecipes()">
                </div>
            </div>
            <div class="p-3 space-y-2 flex-1" id="recipesList"></div>
        </div>

        <div id="screen-schedule" class="flex-1 flex flex-col hidden">
            <div class="bg-slate-900 text-white p-4 sticky top-0 z-10 shadow-md">
                <div class="flex justify-between items-center">
                    <h1 class="text-xl font-bold flex items-center gap-2">
                        <i class="text-amber-400 w-5 h-5" data-lucide="calendar"></i> Мой График
                    </h1>
                    <button onclick="handleLogout()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5 text-gray-300">
                        <span id="userScheduleBadge">Повар</span> <i class="w-3.5 h-3.5 text-red-400" data-lucide="log-out"></i>
                    </button>
                </div>
            </div>
            
            <div class="bg-white p-3 border-b border-gray-200 flex justify-center gap-4 text-xs font-medium">
                <div class="flex items-center gap-1.5"><span class="w-3 h-3 bg-emerald-500 rounded-full block"></span> с 08:00</div>
                <div class="flex items-center gap-1.5"><span class="w-3 h-3 bg-orange-500 rounded-full block"></span> с 11:00</div>
            </div>

            <div class="p-4">
                <div class="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm">
                    <div class="text-center font-bold text-base text-slate-800 mb-4" id="calendarMonthTitle">Загрузка...</div>
                    <div class="grid grid-cols-7 gap-2 text-center text-xs font-semibold text-gray-400 mb-2">
                        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
                    </div>
                    <div class="grid grid-cols-7 gap-2" id="calendarGrid"></div>
                </div>
            </div>
        </div>

        <div id="imageModal" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col justify-between p-4">
            <div class="flex justify-between items-center text-white">
                <h3 id="modalTitle" class="font-bold text-base truncate pr-4">Название</h3>
                <button onclick="closeModal()" class="bg-white/10 p-2 rounded-full"><i class="w-6 h-6 text-white" data-lucide="x"></i></button>
            </div>
            <div class="flex-1 flex items-center justify-center overflow-hidden my-4">
                <img id="modalImage" src="" alt="ТК" class="max-w-full max-h-full object-contain rounded-lg">
            </div>
            <div class="text-center text-gray-400 text-xs pb-2">Разведите пальцами для масштаба</div>
        </div>

        <div id="navBar" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-slate-900 text-white border-t border-slate-800 h-16 flex items-center justify-around z-20 shadow-2xl hidden">
            <button onclick="switchScreen('inventory')" id="nav-inventory" class="flex flex-col items-center gap-1 text-amber-400 transition-colors">
                <i class="w-5 h-5" data-lucide="package"></i><span class="text-[10px] font-medium">Инвентарь</span>
            </button>
            <button onclick="switchScreen('recipes')" id="nav-recipes" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
                <i class="w-5 h-5" data-lucide="book-open"></i><span class="text-[10px] font-medium">Техкарты</span>
            </button>
            <button onclick="switchScreen('schedule')" id="nav-schedule" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
                <i class="w-5 h-5" data-lucide="calendar"></i><span class="text-[10px] font-medium">График</span>
            </button>
        </div>

    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby42DjQ-GEVXyRDubiN3DxvG_u7G2t-EYRWRKlaf6OARVhe8UbJfDmwJOxyWg1aSOVuig/exec";

        const INVENTORY_DATA = [
            { id: 1, name: 'Сливки 33% Чудское озеро', category: 'Молочка', unit: 'кг' },
            { id: 2, name: 'Сыр Пармезан тертый', category: 'Молочка', unit: 'кг' },
            { id: 3, name: 'Томаты Черри', category: 'Овощи/Зелень', unit: 'кг' },
            { id: 4, name: 'Яйцо куриное С1', category: 'Яйцо', unit: 'шт' }
        ];

        const RECIPES_DATA = [
            { id: 1, name: 'Соус Айоли классический (п/ф)', img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500' },
            { id: 2, name: 'Соус Айоли трюфельный (п/ф)', img: 'https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=500' }
        ];

        let currentInvCat = 'Все';
        let invAmounts = {};
        let currentUser = null;
        let userSchedule = [];
        let userPosition = "Повар";

        try {
            const savedUser = localStorage.getItem('kitchen_logged_user');
            if (savedUser) currentUser = JSON.parse(savedUser);
        } catch(e) { console.error("Ошибка чтения localStorage", e); }

        function init() {
            lucide.createIcons();
            if (currentUser && currentUser.name) { 
                showMainApp(); 
            } else { 
                document.getElementById('screen-auth').classList.remove('hidden'); 
            }
        }

        function handleLogin(event) {
            if(event) event.preventDefault();
            
            const loginInput = document.getElementById('authLogin').value.trim();
            const passInput = document.getElementById('authPassword').value.trim();
            if (!loginInput || !passInput) { alert("Заполните логин и пароль!"); return; }
            
            const btn = event && event.target ? event.target : document.querySelector('#screen-auth button'); 
            if(btn) { btn.innerText = "Проверка..."; btn.disabled = true; }

            fetch(WEB_APP_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain" }, 
                body: JSON.stringify({ action: "login", login: loginInput, password: passInput }) 
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success" && data.user) { 
                    currentUser = data.user; 
                    localStorage.setItem('kitchen_logged_user', JSON.stringify(currentUser)); 
                    showMainApp(); 
                } else if (data.status === "wrong_auth") {
                    alert("Неверный логин или пароль!"); 
                } else {
                    alert("Ошибка сервера: " + (data.message || "Неизвестная ошибка"));
                }
            })
            .catch(err => { 
                alert("Ошибка сети или скрипта."); 
                console.error(err); 
            })
            .finally(() => { 
                if(btn) { btn.innerText = "Войти в систему"; btn.disabled = false; }
            });
        }

        function showMainApp() {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-inventory').classList.remove('hidden');
            document.getElementById('navBar').classList.remove('hidden');
            
            document.querySelectorAll('.userBadgeName').forEach(el => {
                if(currentUser && currentUser.name) el.innerText = currentUser.name;
            });
            
            renderInvCategories(); 
            renderInventory(); 
            renderRecipes(); 
            loadSchedule(); 
            lucide.createIcons();
        }

        function handleLogout() { 
            localStorage.removeItem('kitchen_logged_user'); 
            location.reload(); 
        }
        
        function switchScreen(screen) {
            document.getElementById('screen-inventory').classList.toggle('hidden', screen !== 'inventory');
            document.getElementById('screen-recipes').classList.toggle('hidden', screen !== 'recipes');
            document.getElementById('screen-schedule').classList.toggle('hidden', screen !== 'schedule');
            document.getElementById('nav-inventory').className = screen === 'inventory' ? 'flex flex-col items-center gap-1 text-amber-400' : 'flex flex-col items-center gap-1 text-gray-400';
            document.getElementById('nav-recipes').className = screen === 'recipes' ? 'flex flex-col items-center gap-1 text-amber-400' : 'flex flex-col items-center gap-1 text-gray-400';
            document.getElementById('nav-schedule').className = screen === 'schedule' ? 'flex flex-col items-center gap-1 text-amber-400' : 'flex flex-col items-center gap-1 text-gray-400';
        }

        function loadSchedule() {
            if(!currentUser || !currentUser.name) return;
            fetch(WEB_APP_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain" }, 
                body: JSON.stringify({ action: "getSchedule", userName: currentUser.name }) 
            })
            .then(res => res.json())
            .then(data => { 
                userSchedule = data.schedule || []; 
                userPosition = data.position || "Повар";
                const badge = document.getElementById('userScheduleBadge');
                if(badge) badge.innerText = `${currentUser.name} (${userPosition})`;
                renderCalendar(); 
            })
            .catch(err => console.error("Ошибка загрузки графика:", err));
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            if(!grid) return;
            
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            
            const titleEl = document.getElementById('calendarMonthTitle');
            if(titleEl) titleEl.innerText = `${monthNames[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const shiftClick = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            const totalDays = new Date(year, month + 1, 0).getDate();

            let cells = "";
            for (let i = 0; i < shiftClick; i++) { cells += `<div></div>`; }

            for (let day = 1; day <= totalDays; day++) {
                const daySchedule = userSchedule.find(s => s.day === day);
                let bgClass = "bg-gray-50 text-gray-700 border-gray-100";
                let badgeText = "";

                if (daySchedule && daySchedule.shift) {
                    // Самая безопасная очистка текста без сложных регулярных выражений
                    let rawShift = daySchedule.shift.toString().trim().replace(',', '.');
                    rawShift = rawShift.split(' ').join(''); // удаляем пробелы
                    
                    const parts = rawShift.split('-');
                    const startTime = parts[0] ? parts[0].trim() : "";
                    const loadType = parts[1] ? parts[1].trim() : "";

                    // ЦВЕТ КВАДРАТА
                    if (startTime === "8" || startTime === "08") {
                        bgClass = "bg-emerald-500 text-white font-bold border-transparent";
                    } else if (startTime === "11") {
                        bgClass = "bg-orange-500 text-white font-bold border-transparent";
                    } else {
                        bgClass = "bg-slate-400 text-white font-bold border-transparent";
                    }

                    // ТЕКСТ НАГРУЗКИ / ЧЕРЕПОК
                    if (loadType === "0.5") {
                        badgeText = "0.5 см.";
                    } else if (loadType === "1" || loadType === "1.0") {
                        badgeText = "1 см.";
                    } else if (loadType === "1.3") {
                        badgeText = "💀 ЗАКР";
                    } else {
                        // Если в ячейке просто "8" или "11" без дефиса нагрузку ставим по умолчанию
                        badgeText = loadType ? loadType : "1 см.";
                    }
                }

                cells += `
                    <div class="aspect-square rounded-xl border flex flex-col items-center justify-center relative ${bgClass} text-xs transition-all">
                        <span>${day}</span>
                        ${badgeText ? `<span class="text-[8px] opacity-90 absolute bottom-0.5 whitespace-nowrap leading-none font-medium">${badgeText}</span>` : ''}
                    </div>
                `;
            }
            grid.innerHTML = cells;
        }

        function renderInvCategories() { 
            const container = document.getElementById('invCategories');
            if(!container) return;
            const cats = ['Все', ...new Set(INVENTORY_DATA.map(p => p.category))]; 
            container.innerHTML = cats.map(c => `<button onclick="setInvCat('${c}')" class="px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap ${currentInvCat === c ? 'bg-amber-400 text-slate-950' : 'bg-gray-100 text-gray-600'}">${c}</button>`).join(''); 
        }
        
        function setInvCat(c) { currentInvCat = c; renderInvCategories(); filterInventory(); }
        
        function renderInventory(data = INVENTORY_DATA) { 
            const list = document.getElementById('invList'); 
            if(!list) return;
            
            const totalEl = document.getElementById('totalCount');
            const factEl = document.getElementById('countedFact');
            if(totalEl) totalEl.innerText = INVENTORY_DATA.length; 
            if(factEl) factEl.innerText = Object.keys(invAmounts).filter(k => invAmounts[k] !== '').length; 
            
            if(data.length === 0) { list.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">Нет товаров</div>`; return; } 
            
            list.innerHTML = data.map(p => { 
                const val = invAmounts[p.id] || ''; 
                return `<div class="bg-white p-3 rounded-xl border flex items-center justify-between ${val !== '' ? 'border-emerald-200 bg-emerald-50/20' : 'border-gray-100'}"><div class="flex-1 pr-2"><div class="font-medium text-sm text-gray-900">${p.name}</div></div><div class="relative flex items-center"><input type="text" inputmode="decimal" placeholder="0" value="${val}" oninput="changeWeight(${p.id}, this.value)" class="w-16 bg-gray-50 border border-gray-300 text-center py-1.5 rounded-lg font-bold text-sm focus:outline-none focus:border-amber-500"><span class="absolute right-2 text-xs text-gray-400 pointer-events-none">${p.unit}</span></div></div>`; 
            }).join(''); 
        }
        
        function changeWeight(id, val) { 
            if (/^\d*\.?\d*$/.test(val)) invAmounts[id] = val; 
            const factEl = document.getElementById('countedFact');
            if(factEl) factEl.innerText = Object.keys(invAmounts).filter(k => invAmounts[k] !== '').length; 
        }
        
        function filterInventory() { 
            const searchEl = document.getElementById('invSearch');
            const q = searchEl ? searchEl.value.toLowerCase() : ''; 
            const res = INVENTORY_DATA.filter(p => p.name.toLowerCase().includes(q) && (currentInvCat === 'Все' || p.category === currentInvCat)); 
            renderInventory(res); 
        }
        
        function sendReport(event) { 
            const itemsToSend = INVENTORY_DATA.filter(p => invAmounts[p.id] !== undefined && invAmounts[p.id] !== '').map(p => ({ name: p.name, unit: p.unit, volume: parseFloat(invAmounts[p.id]) })); 
            if (itemsToSend.length === 0) { alert("Вы ничего не ввели!"); return; } 
            
            const btn = event.target; 
            if(btn) { btn.innerText = "Отправка..."; btn.disabled = true; }
            
            fetch(WEB_APP_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "inventory", userName: currentUser.name, items: itemsToSend }) 
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert("Данные успешно отправлены!"); 
                    invAmounts = {}; 
                    renderInventory(); 
                } else {
                    alert("Ошибка при сохранении: " + data.message);
                }
            })
            .catch(err => { alert("Ошибка сети: " + err); })
            .finally(() => { 
                if(btn) { btn.innerText = "Отправить"; btn.disabled = false; }
            }); 
        }
        
        function renderRecipes(data = RECIPES_DATA) { 
            const list = document.getElementById('recipesList'); 
            if(!list) return;
            list.innerHTML = data.map(r => `<div onclick="openModal('${r.name}', '${r.img}')" class="bg-white p-4 rounded-xl border border-gray-100 flex items-center justify-between active:bg-gray-50 transition-all cursor-pointer shadow-sm"><div class="font-semibold text-sm text-slate-900">${r.name}</div><i class="w-5 h-5 text-gray-300" data-lucide="chevron-right"></i></div>`).join(''); 
            lucide.createIcons(); 
        }
        
        function filterRecipes() { 
            const searchEl = document.getElementById('recSearch');
            const q = searchEl ? searchEl.value.toLowerCase() : ''; 
            const res = RECIPES_DATA.filter(r => r.name.toLowerCase().includes(q)); 
            renderRecipes(res); 
        }
        
        function openModal(title, imgSrc) { 
            document.getElementById('modalTitle').innerText = title; 
            document.getElementById('modalImage').src = imgSrc; 
            document.getElementById('imageModal').classList.remove('hidden'); 
        }
        
        function closeModal() { document.getElementById('imageModal').classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
